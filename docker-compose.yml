services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: nesting_project
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nesting_project_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nesting_project"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "80:80"
    environment:
      NESTING_PROJECT_DATABASE_PASSWORD: password
      DB_HOST: db
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: